name: Deploy Backend to ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: tds-backend
  ECS_CLUSTER: tds-production
  ECS_SERVICE: tds-api
  CONTAINER_NAME: tds-api

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_DEPLOY_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DEPLOY_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Run Prisma migrations (inside VPC via ECS run-task)
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster tds-production \
            --task-definition tds-backend \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-0336cdf666aef4dc1,subnet-051cd40f880567176],securityGroups=[sg-0fc5c1075b47b6bf7],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"tds-api","command":["npx","prisma","migrate","deploy"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster tds-production --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster tds-production --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[?name==`tds-api`].exitCode' --output text)
          echo "Migration exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then echo "Migration failed" && exit 1; fi

      - name: Run Prisma seed (upserts reference data — safe to re-run)
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster tds-production \
            --task-definition tds-backend \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-0336cdf666aef4dc1,subnet-051cd40f880567176],securityGroups=[sg-0fc5c1075b47b6bf7],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"tds-api","command":["sh","-c","set -ex; ls -la dist/seed/ || true; node --version; node dist/seed/seed.prod.js"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          echo "Seed task: $TASK_ARN"
          TASK_ID="${TASK_ARN##*/}"
          aws ecs wait tasks-stopped --cluster tds-production --tasks "$TASK_ARN"

          # Fetch task details (stop reason + exit code)
          aws ecs describe-tasks --cluster tds-production --tasks "$TASK_ARN" \
            --query 'tasks[0].{stoppedReason:stoppedReason,container:containers[0].{name:name,exitCode:exitCode,reason:reason}}' \
            --output json

          # Fetch CloudWatch logs from the seed task so we can see the actual error
          echo "--- CloudWatch logs for seed task ---"
          LOG_GROUP=$(aws ecs describe-task-definition --task-definition tds-backend \
            --query 'taskDefinition.containerDefinitions[0].logConfiguration.options."awslogs-group"' --output text)
          LOG_STREAM_PREFIX=$(aws ecs describe-task-definition --task-definition tds-backend \
            --query 'taskDefinition.containerDefinitions[0].logConfiguration.options."awslogs-stream-prefix"' --output text)
          LOG_STREAM="${LOG_STREAM_PREFIX}/tds-api/${TASK_ID}"
          echo "Log group: $LOG_GROUP"
          echo "Log stream: $LOG_STREAM"
          aws logs get-log-events --log-group-name "$LOG_GROUP" --log-stream-name "$LOG_STREAM" \
            --limit 200 --query 'events[].message' --output text || echo "(could not fetch logs)"
          echo "--- end logs ---"

          EXIT_CODE=$(aws ecs describe-tasks --cluster tds-production --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[?name==`tds-api`].exitCode' --output text)
          echo "Seed exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then echo "Seed failed" && exit 1; fi

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition tds-backend \
            --query taskDefinition \
            --output json > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
